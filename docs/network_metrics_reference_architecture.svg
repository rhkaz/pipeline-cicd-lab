<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1012" viewBox="0 0 1800 1012" role="img" aria-labelledby="title desc">
  <title id="title">Batch Telecom Network Metrics — Production Reference Architecture</title>
  <desc id="desc">Tool-neutral architecture separating the cross-cutting pipeline control plane from the Bronze Silver Gold medallion data plane, with telecom sources, object-storage ingestion, reporting and operational alerting.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4C627A"/>
    </marker>
    <marker id="arrow-coral" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#7454D6"/>
    </marker>
    <marker id="arrow-error" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#D45172"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#24364B" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; fill: #223248; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #637386; }
      .column-title { font-size: 18px; font-weight: 700; letter-spacing: 0.2px; }
      .platform-title { font-size: 25px; font-weight: 700; fill: #FFFFFF; letter-spacing: 0.4px; }
      .band-title { font-size: 20px; font-weight: 700; fill: #FFFFFF; }
      .card-title { font-size: 19px; font-weight: 700; }
      .body { font-size: 16px; }
      .small { font-size: 14px; fill: #637386; }
      .tiny { font-size: 12px; fill: #6E7D90; }
      .layer-title { font-size: 20px; font-weight: 700; }
      .layer-text { font-size: 13px; fill: #637386; }
      .flow { fill: none; stroke: #4C627A; stroke-width: 2.5; marker-end: url(#arrow); }
      .planned-flow { fill: none; stroke: #7454D6; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-coral); }
      .error-flow { fill: none; stroke: #D45172; stroke-width: 2.5; marker-end: url(#arrow-error); }
    </style>
  </defs>

