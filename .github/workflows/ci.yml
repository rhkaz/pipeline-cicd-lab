name: pipeline-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Check submission hygiene
        run: python scripts/validate_submission.py
      - name: Install
        run: pip install -e ".[test,demo]"
      - name: Run tests
        run: pytest -q
