name: Promote network pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Code quality and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff

      - name: Run critical Ruff checks
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Run unit tests
        env:
          SPARK_LOCAL_IP: "127.0.0.1"
        run: python -m pytest -q

  development:
    name: Development pipeline
    needs: ci
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate development configuration
        env:
          PIPELINE_CONFIG: ${{ vars.PIPELINE_CONFIG }}
        run: |
          test -n "$PIPELINE_CONFIG"
          test -f "$PIPELINE_CONFIG"
          echo "Development configuration: $PIPELINE_CONFIG"

  test:
    name: Test pipeline
    needs: development
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate test configuration
        env:
          PIPELINE_CONFIG: ${{ vars.PIPELINE_CONFIG }}
        run: |
          test -n "$PIPELINE_CONFIG"
          test -f "$PIPELINE_CONFIG"
          echo "Test configuration: $PIPELINE_CONFIG"

  production:
    name: Production pipeline
    needs: test
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate production configuration
        env:
          PIPELINE_CONFIG: ${{ vars.PIPELINE_CONFIG }}
        run: |
          test -n "$PIPELINE_CONFIG"
          test -f "$PIPELINE_CONFIG"
          echo "Production configuration: $PIPELINE_CONFIG"